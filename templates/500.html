{% extends "base.html" %}
{% block title %}Server Error — Nexus{% endblock %}

{% block content %}
<div style="text-align:center; padding:80px 24px;">
    <div style="font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--red); letter-spacing:0.2em; margin-bottom:12px;">SYSTEM ERROR</div>
    <div style="font-family:'Rajdhani',sans-serif; font-size:6rem; font-weight:700; color:var(--rim); line-height:1; margin-bottom:16px;">500</div>
    <h2 style="color:var(--pale); margin-bottom:8px;">Something Went Wrong</h2>
    <p class="text-muted" style="margin-bottom:28px; max-width:360px; margin-left:auto; margin-right:auto;">
        An unexpected error occurred on our end. Try again in a moment.
    </p>
    <a href="{% url 'tournament_list' %}" class="btn btn-primary">Go to Dashboard</a>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Register Team — Nexus{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left">
        <div class="page-label">New Registration</div>
        <h1>Register a Team</h1>
        <p class="page-meta">Submit a team for tournament registration</p>
    </div>
    <a href="{% url 'team_list' %}" class="btn btn-ghost">← Back</a>
</div>

<div class="form-card" style="max-width:560px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-group" style="margin-top:8px;">
            <button type="submit" class="btn btn-primary">Submit Registration</button>
            <a href="{% url 'team_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

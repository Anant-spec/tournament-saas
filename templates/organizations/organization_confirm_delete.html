<!DOCTYPE html>
<html>
<head>
    <title>Delete Organization</title>
</head>
<body>
    <h1>Delete Organization</h1>

    <p>Are you sure you want to delete "{{ organization.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <a href="/organizations/">Cancel</a>
</body>
</html>

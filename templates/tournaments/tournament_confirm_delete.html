<!DOCTYPE html>
<html>
<head>
    <title>Delete Tournament</title>
</head>
<body>
    <h1>Delete Tournament</h1>

    <p>Are you sure you want to delete "{{ tournament.name }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <a href="{% url 'tournament_list' %}">Cancel</a>
</body>
</html>
